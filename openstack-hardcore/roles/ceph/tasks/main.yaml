- name: Gather installed package facts
  package_facts:
    manager: auto
  when: ceph == "enabled"
  tags: [ ceph_inst ]


- name: Check if Docker is installed
  set_fact:
    docker_installed: "{{ 'docker-ce' in ansible_facts.packages }}"
  when: ceph == "enabled"
  tags: [ ceph_inst ]


- name: Install prerequisites
  apt:
    name:
      - software-properties-common
      - python3-pip
    state: present
    update_cache: yes
  tags: [ ceph_inst ]
  when: ceph == "enabled"



- name: Add Ceph repository key
  get_url:
    url: https://download.ceph.com/keys/release.asc
    dest: /etc/apt/keyrings/ceph.asc
    mode: '0644'
  tags: [ ceph_inst ]
  when: ceph == "enabled"

- name: Add Ceph Reef repository (use jammy for noble)
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/ceph.asc] https://download.ceph.com/debian-reef/ jammy main"
    state: present
    filename: ceph
  when: ceph == "enabled"
  tags: [ ceph_inst ]

- name: Install cephadm (modern deployment tool)
  apt:
    name: cephadm
    state: present
  tags: [ ceph_inst ]
  when: monitor == "enabled"


- name: install docker services on all nodes
  apt: 
    name: "{{ item }}"
    state: present
  with_items:
  - ca-certificates
  - curl
  tags: [ ceph_inst ]
  when: 
  - ceph == "enabled"
  - not docker_installed


- name: Ensure keyrings directory exists
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: true
  tags: [ ceph_inst ]
  when: 
  - ceph == "enabled"
  - not docker_installed

- name: Download Docker GPG key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
  become: true
  tags: [ ceph_inst ]
  when: 
  - ceph == "enabled"
  - not docker_installed


- name: Add Docker repository
  copy:
    dest: /etc/apt/sources.list.d/docker.sources
    content: |
      Types: deb
      URIs: https://download.docker.com/linux/ubuntu
      Suites: {{ ansible_distribution_release }}
      Components: stable
      Signed-By: /etc/apt/keyrings/docker.asc
    mode: '0644'
  tags: [ ceph_inst ]
  when: 
  - ceph == "enabled"
  - not docker_installed


# - name: Update apt cache
#   apt:
#     update_cache: yes
#   tags: [ ceph ]
#   when: 
#   - ceph == "enabled"
#   - not docker_installed


- name: Install Docker packages
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes

  when: 
  - ceph == "enabled"
  - not docker_installed
  tags: [ ceph_inst ]




# Ceph Monitors Setup
- name: Create Ceph cluster directory
  file:
    path: /etc/ceph
    state: directory
    mode: '0755'
  tags: [ ceph_inst ]
  when: monitor == "enabled"

- name: Bootstrap Ceph cluster
  shell: >
    cephadm bootstrap
    --mon-ip {{ initial_ceph_mon }}
    --cluster-network {{ ceph_cluster_network }}
    --skip-monitoring-stack 
    --initial-dashboard-user {{ dashboard_username }}
    --initial-dashboard-password {{ dashboard_password }}
    --dashboard-password-noupdate
    --skip-pull
  args:
    creates: /etc/ceph/ceph.conf
  tags: [ ceph_inst ]
  when: hostname == "ubuntu-01"



- name: Check Ceph cluster status
  shell: ceph status
  register: ceph_status
  ignore_errors: yes
  when: hostname == "ubuntu-01"
  tags: [ ceph_check ]

- name: Display Ceph cluster status
  debug:
    var: ceph_status.stdout
  when: hostname == "ubuntu-01"
  tags: [  ceph_check ]






- name: Add additional monitor nodes
  shell: "ceph orch host add {{ item }}"
  loop: "{{ ceph_mon_nodes[1:] }}"  # skip bootstrap
  tags: [ceph]


