- name: ----- install placement -----
  apt:
    name: "{{ item }}"
    state: present
    update_cache: yes
  with_items:
    - placement-api
  tags: [ placement ]


- name: check user creation
  shell: >
    openstack --os-project-name {{ openstack_project }} user list | grep -E "placement"
  register: check_users_placement
  when: 
    - keystone == "enabled"
  tags: [ placement ]


- name: ----- create new user ------
  shell: >
    openstack  --os-project-name {{ openstack_project }}  
    user create --domain default  "{{ placement_username }}" --password  "{{ placement_password }}"
  when: 
    - keystone == "enabled"
    - check_users_placement.rc == 0  
  tags: [ placement ]
  ignore_errors: true


- name: Add admin role to service users
  shell: >
      openstack --os-project-name {{ openstack_project }} 
      role add --project {{ openstack_project }} 
      --user "{{ placement_username }}" --user-domain "{{ openstack_domain }}" admin      
  register: role_add
  when:
    - keystone == "enabled"
    - check_users_placement.rc == 0  
  tags: [ placement ]


- name: check placement service
  shell: >
    openstack --os-project-name {{ openstack_project }}
    service list | grep placement | awk '{print $1}'
  register: placement_service
  failed_when: false
  changed_when: false
  tags: [ placement ]
  when:
    - keystone == "enabled"


- name: create placement service
  shell: >
    openstack --os-project-name {{ openstack_project }}
    --name placement
    --description "Placement API"
    placement
  when:
    - keystone == "enabled"
    - placement_service.stdout == ""
  tags: [ placement ]



- name: print placement service check output
  debug:
    msg: "Placement service IDs: {{ placement_service.stdout_lines }}"
  when: keystone == "enabled"
  tags: [ placement ]



- name: check endpoint creation
  shell: >
    openstack --os-project-name {{ openstack_project }}
    endpoint list | grep -E "placement"
  register: check_endpoint
  failed_when: check_endpoint.rc > 1
  changed_when: false
  tags: [ placement ]
  when:
    - keystone == "enabled"



- name: Create OpenStack internal Placement endpoint
  shell: >
    openstack --os-project-name {{ openstack_project }}
    endpoint create
    --region RegionOne
    {{ item.type }}
    internal
    http://{{ controller_admin_address }}:{{ item.port }}{{ item.path | default('') }}
  with_items:
    - { name: 'placement', type: 'placement', port: '8778' }
  when:
    - keystone == "enabled"
    - check_endpoint.rc == 1
  tags: [ placement ]





- name: Create OpenStack public Placement endpoint
  shell: >
    openstack --os-project-name {{ openstack_project }}
    endpoint create
    --region RegionOne
    {{ item.type }}
    public
    http://{{ controller_admin_address }}:{{ item.port }}{{ item.path | default('') }}
  with_items:
    - { name: 'placement', type: 'placement', port: '8778' }
  when:
    - keystone == "enabled"
#    - check_endpoint.rc == 1
  tags: [ placement ]




- name: Create OpenStack admin Placement endpoint
  shell: >
    openstack --os-project-name {{ openstack_project }}
    endpoint create
    --region RegionOne
    {{ item.type }}
    admin
    http://{{ controller_admin_address }}:{{ item.port }}{{ item.path | default('') }}
  with_items:
    - { name: 'placement', type: 'placement', port: '8778' }
  when:
    - keystone == "enabled"
#    - check_endpoint.rc == 1
  tags: [ placement ]




- name: Deploy placement compute configuration
  template:
    src: placement.conf.j2
    dest: /etc/placement/placement.conf
    owner: placement
    group: placement
    mode: '0640'
  notify: placement_restart
  tags: [ placement ]
  when: 
    - placement == "enabled"

